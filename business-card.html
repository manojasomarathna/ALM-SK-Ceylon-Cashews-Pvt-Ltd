<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Business Card — ALM SK Ceylon Cashews</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Times New Roman',serif;background:#eee;display:flex;flex-direction:column;align-items:center;padding:30px}

.controls{background:#2a1200;padding:12px 24px;display:flex;gap:10px;align-items:center;width:100%;max-width:800px;border-radius:8px;margin-bottom:24px}
.controls button{background:#c8960c;color:#1a0800;border:none;padding:8px 22px;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer}
.controls span{color:#c8a878;font-size:12px}

.cards-grid{display:grid;grid-template-columns:repeat(3,85.6mm);grid-template-rows:repeat(3,53.98mm);gap:4mm}

.card{width:85.6mm;height:53.98mm;background:#2a1200;border-radius:4px;overflow:hidden;position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:5mm 6mm}

/* Gold top border */
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;background:linear-gradient(90deg,#c8960c,#f5d06a,#c8960c)}
/* Gold bottom border */
.card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2.5px;background:linear-gradient(90deg,#c8960c,#f5d06a,#c8960c)}

.card-top{display:flex;align-items:center;gap:4mm}
.card-logo{width:32px;height:32px;border-radius:50%;object-fit:contain;border:1.5px solid #c8960c;flex-shrink:0}
.card-name-block{}
.card-biz-name{font-size:9.5pt;font-weight:700;color:#f5e6c8;line-height:1.2}
.card-tagline{font-size:6.5pt;color:#c8960c;font-style:italic;margin-top:1px;letter-spacing:0.04em}

.card-divider{height:0.5px;background:rgba(200,150,12,0.35);margin:0}

.card-contacts{display:flex;flex-direction:column;gap:2px}
.card-contact-row{display:flex;align-items:center;gap:3mm}
.card-contact-icon{font-size:8pt;width:12px;text-align:center;flex-shrink:0}
.card-contact-text{font-size:7.5pt;color:#c8a878;line-height:1.3}
.card-contact-text.highlight{color:#f5e6c8}

.card-bottom{display:flex;justify-content:space-between;align-items:flex-end}
.card-address{font-size:6.5pt;color:#7a5030;line-height:1.4}
.card-web{font-size:6.5pt;color:#c8960c;text-align:right}

@media print{
  body{background:#fff;padding:10mm}
  .controls{display:none}
  .cards-grid{gap:3mm}
}
</style>
</head>
<body>

<div class="controls">
  <img src="Logo.png" style="width:28px;height:28px;border-radius:50%;object-fit:contain">
  <span style="color:#f5e6c8;font-weight:700;font-size:14px">Business Card — ALM SK Ceylon Cashews</span>
  <button onclick="window.print()">🖨 Print</button>
  <span>A4 · Portrait · Print Backgrounds ON</span>
</div>

<div class="cards-grid">

  <!-- Card 1 -->
  <div class="card">
    <div class="card-top">
      <img src="Logo.png" class="card-logo" alt="Logo">
      <div class="card-name-block">
        <div class="card-biz-name">ALM SK Ceylon Cashews</div>
        <div class="card-tagline">"Taste of Pure Ceylon"</div>
      </div>
    </div>
    <div class="card-divider"></div>
    <div class="card-contacts">
      <div class="card-contact-row">
        <span class="card-contact-icon">📞</span>
        <span class="card-contact-text highlight">+94 78 381 9650</span>
      </div>
      <div class="card-contact-row">
        <span class="card-contact-icon">✉️</span>
        <span class="card-contact-text">almskceyloncashews@gmail.com</span>
      </div>
      <div class="card-contact-row">
        <span class="card-contact-icon">🌐</span>
        <span class="card-contact-text">almskceyloncashews.netlify.app</span>
      </div>
    </div>
    <div class="card-bottom">
      <div class="card-address">Diulwewa, Anamaduwa<br>Kurunegala, Sri Lanka</div>
      <div class="card-web">Raw · Roasted<br>Flavored Cashews</div>
    </div>
  </div>

</div>
</body>
</html>
